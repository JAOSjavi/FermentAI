[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --html=tests/reports/reporte_pruebas.html
    --self-contained-html
    --json-report
    --json-report-file=tests/reports/reporte_pruebas.json
markers =
    funcional: Pruebas funcionales de la API REST
    disponibilidad: Pruebas de disponibilidad del servicio
    latencia: Pruebas de tiempos de respuesta
    seguridad: Pruebas de seguridad OWASP básicas
    accesibilidad: Pruebas de accesibilidad WCAG
    compatibilidad: Pruebas multi-navegador
    w3c: Validación de estándares W3C
    rendimiento: Pruebas de rendimiento y carga
