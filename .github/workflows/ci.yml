name: Build & Deploy — FermentAI

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Verificar que las imágenes Docker compilan
  # ─────────────────────────────────────────────
  build:
    name: Build images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: docker build -t fermentai-backend ./backend

      - name: Build frontend
        run: docker build -t fermentai-frontend ./frontend

  # ─────────────────────────────────────────────
  # Deploy a Railway solo si el build pasó
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy backend
        run: curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_BACKEND }}"

      - name: Deploy frontend
        run: curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK_FRONTEND }}"
