name: CI — FermentAI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. Pruebas unitarias del backend
  # ─────────────────────────────────────────────
  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Ejecutar pruebas unitarias
        run: pytest backend/tests/ -v --tb=short
        env:
          PYTHONPATH: backend

  # ─────────────────────────────────────────────
  # 2. Build de la imagen Docker del backend
  # ─────────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Build imagen backend
        run: docker build -t fermentai-backend:${{ github.sha }} ./backend

  # ─────────────────────────────────────────────
  # 3. Build de la imagen Docker del frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build imagen frontend
        run: docker build -t fermentai-frontend:${{ github.sha }} ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
